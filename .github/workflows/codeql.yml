name: "CodeQL"

on:
  workflow_dispatch:
  push:
    branches: [ 'master' ]
    paths:
      - '**.c'
      - '**.cpp'
      - '**.h'
  pull_request:
    types:
      - opened
    branches: [ 'master' ]
    paths:
      - '**.c'
      - '**.cpp'
      - '**.h'
  schedule:
    - cron: '33 7 * * 6'

jobs:
  analyze-cpp:
    name: Analyze (C/C++)
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: windows-2022
    timeout-minutes: 60

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL (C/C++)
      uses: github/codeql-action/init@v4
      with:
        languages: c-cpp
        build-mode: autobuild
        config-file: ./.github/codeql/codeql-config.yml

    - name: Autobuild (C/C++)
      uses: github/codeql-action/autobuild@v4

    - name: Perform CodeQL Analysis (C/C++)
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:c-cpp"

  analyze-other:
    name: Analyze (Actions + JS/TS)
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ actions, javascript-typescript ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL (${{ matrix.language }})
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        config-file: ./.github/codeql/codeql-config.yml

    - name: Perform CodeQL Analysis (${{ matrix.language }})
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{ matrix.language }}"
